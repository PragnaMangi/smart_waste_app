<!DOCTYPE html>
<html>
<head>

<title>Waste Map</title>

<style>

body{
font-family:Arial;
margin:0;
background:#f4f7f5;
}

.header{
background:green;
color:white;
padding:15px;
font-size:20px;
}

.container{
padding:16px;
}

.title{
font-size:20px;
font-weight:bold;
margin-bottom:20px;
}

.card{
background:white;
padding:15px;
border-radius:10px;
margin-bottom:12px;
box-shadow:0 2px 5px rgba(0,0,0,0.1);
display:flex;
align-items:center;
}

.icon{
color:green;
font-size:22px;
margin-right:10px;
}

</style>

</head>

<body>

<div class="header">
Waste Map 🌍
</div>

<div class="container">

<div class="title">
Nearby Waste Collection Points
</div>

<div class="card">
<span class="icon">📍</span>
<div>
<b>Recycle Center - Main Road</b><br>
Plastic, Paper, Glass accepted
</div>
</div>

<div class="card">
<span class="icon">📍</span>
<div>
<b>Municipal Dump Yard</b><br>
Large waste collection point
</div>
</div>

<div class="card">
<span class="icon">📍</span>
<div>
<b>Eco Waste Hub</b><br>
Organic + E-waste recycling
</div>
</div>

</div>

</body>
</html>
